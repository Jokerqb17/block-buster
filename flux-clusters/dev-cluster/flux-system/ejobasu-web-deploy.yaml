apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: nginx-app
  name: web-app
  namespace: wave2
spec:
  replicas: 1
  selector:
    matchLabels:
      app: web-app
  template:
    metadata:
      labels:
        app: web-app
    spec:
      containers:
      - image: nginx:1.31.1-alpine-slim
        name: webcont
        resources:
          requests:
            cpu: "200m"
